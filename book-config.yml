# ============================================================
# 書籍構造設定ファイル
# ============================================================
# このファイルで章の数や各パートの文字数を設定します。
# 変更後、コマンドを実行すればそのまま反映されます。

# --- 書籍タイトル ---
title: "ここにタイトルを入力"

# --- 章の構成 ---
chapters:
  count: 8 # 本文の章数（「はじめに」「おわりに」は含まない）

# --- 文字数設定（目安。±10%の範囲で調整される） ---
word_counts:
  introduction: 4000 # 「はじめに」の文字数
  chapter: 10000 # 各章の文字数
  conclusion: 4000 # 「おわりに」の文字数
  # ↑ この設定で合計約 88,000字（新書1冊相当）

# --- セクション分割設定 ---
# 1章あたりの文字数が多い場合、セクション単位で分割執筆する
sections:
  per_chapter: 3 # 1章あたりのセクション数（目安）
  max_chars_per_output: 4000 # 1回の出力で書く最大文字数（出力上限対策）

# --- レビュー設定 ---
# レビューの具体的な基準・観点は review-criteria.md に記述する
review:
  max_rounds: 3 # 最大レビュー回数（この回数を超えたら強制完成）

# --- 出力設定 ---
output:
  format:
    - md # Markdownファイル
    - pdf # PDFファイル
  pdf_engine: "wkhtmltopdf" # PDF変換エンジン（wkhtmltopdf / pandoc）
